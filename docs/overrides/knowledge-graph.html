{% extends "main.html" %}
{% block styles %}
{{ super() }}
<style>
  /* Full-width layout for the knowledge graph page only */
  .md-content        { max-width: 100% !important; }
  .md-content__inner { max-width: 100% !important; margin: 0 !important; padding: 0 1.2rem !important; }
  #kg-container      { height: 82vh; min-height: 560px; }

  /* Fullscreen mode */
  #kg-container:fullscreen,
  #kg-container:-webkit-full-screen {
    width: 100vw !important;
    height: 100vh !important;
    background: var(--md-code-bg-color);
    border-radius: 0;
  }
</style>
{% endblock %}
{% block content %}
<div class="kg-page md-typeset">
  {{ super() }}

  <div class="kg-toolbar">
    <div class="kg-filter-group">
      <label class="kg-toggle">
        <input type="checkbox" id="kg-show-concepts" checked>
        <span class="kg-swatch kg-swatch--concept"></span> Concepts
      </label>
      <label class="kg-toggle">
        <input type="checkbox" id="kg-show-orgs" checked>
        <span class="kg-swatch kg-swatch--org"></span> Organisations
      </label>
      <label class="kg-toggle">
        <input type="checkbox" id="kg-show-projects" checked>
        <span class="kg-swatch kg-swatch--project"></span> Projects
      </label>
      <label class="kg-toggle">
        <input type="checkbox" id="kg-active-only" checked>
        Active&nbsp;only
      </label>
    </div>
    <div class="kg-search-group">
      <input type="search" id="kg-search" placeholder="Search nodes…" autocomplete="off">
    </div>
    <div class="kg-action-group">
      <button id="kg-fit" class="kg-btn">Fit</button>
      <button id="kg-reset" class="kg-btn">Reset</button>
      <button id="kg-fullscreen" class="kg-btn">⛶ Fullscreen</button>
    </div>
  </div>

  <div id="kg-container">
    <div id="kg-info" class="kg-info kg-info--hidden">
      <button id="kg-info-close" class="kg-info__close" aria-label="Close">&times;</button>
      <span id="kg-info-badge" class="kg-info__badge"></span>
      <h3 id="kg-info-title" class="kg-info__title"></h3>
      <p id="kg-info-meta" class="kg-info__meta"></p>
      <a id="kg-info-link" class="kg-info__link" href="#">View page &rarr;</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script>
(function () {
  'use strict';

  // ── colours & helpers ────────────────────────────────────────────────────
  function lerp(a, b, t) { return Math.round(a + (b - a) * t); }

  function blendToGrey(hex, t) {
    var r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
    var gr = 0x90;
    return '#' + [lerp(r,gr,t), lerp(g,gr,t), lerp(b,gr,t)].map(function(x) {
      return x.toString(16).padStart(2,'0');
    }).join('');
  }

  function bgColor(d) {
    var base;
    if (d.type === 'concept') return '#3949ab';
    if (d.type === 'organisation') {
      if (d.status === 'active')            base = '#1565c0';
      else if (d.status === 'deregistered') base = '#78909c';
      else                                  base = '#607d8b';
    } else if (d.type === 'project') {
      base = d.status === 'active' ? '#2e7d32' : '#66bb6a';
    } else {
      return '#9e9e9e';
    }
    return blendToGrey(base, (d.stale_factor || 0) * 0.6);
  }

  var TYPE_EMOJI = {
    'research': '🔬', 'advocacy': '📢', 'platform': '💻',
    'civic_tech': '⚙️', 'practice': '🤝',
    'party': '🗳️', 'political_party': '🗳️', 'political-party': '🗳️',
    'political_movement': '✊', 'governance': '🏛️',
    'philanthropy': '🌱', 'cooperative': '♻️',
    'government': '🏢', 'education': '🎓',
  };

  function staleness(activity_date) {
    if (!activity_date) return 1;
    var days = (Date.now() - new Date(activity_date).getTime()) / 86400000;
    return Math.min(1, Math.max(0, days / 730));
  }

  // ── stylesheet ────────────────────────────────────────────────────────────
  const STYLE = [
    {
      selector: 'node',
      style: {
        'label':               'data(label)',
        'background-color':    ele => bgColor(ele.data()),
        'color':               '#fff',
        'font-size':           '10px',
        'font-family':         'var(--md-text-font, sans-serif)',
        'text-valign':         'center',
        'text-halign':         'center',
        'text-wrap':           'wrap',
        'text-max-width':      '90px',
        'shape':               'round-rectangle',
        'padding':             '5px',
        'width':               'label',
        'height':              'label',
        'border-width':        '1px',
        'border-color':        'rgba(0,0,0,0.3)',
        'cursor':              'pointer',
        'transition-property': 'none',
        'transition-duration': '0s',
      }
    },
    {
      selector: 'node[type = "concept"]',
      style: { 'font-size': '11px', 'font-weight': 'bold', 'padding': '6px' }
    },
    {
      selector: 'node[type = "organisation"]',
      style: { 'font-size': '11px', 'padding': '3px' }
    },
    {
      selector: 'node[type = "project"]',
      style: { 'font-size': '9px' }
    },
    {
      selector: 'edge',
      style: {
        'width':       1,
        'line-color':  '#90a4ae',
        'opacity':     ele => Math.max(0.08, 0.5 - ele.data('stale_rank') * 0.4),
        'curve-style': 'bezier',
      }
    },
    {
      selector: 'edge[type = "see_also"]',
      style: { 'line-color': '#9c27b0', 'line-style': 'dashed', 'opacity': 0.4 }
    },
    {
      selector: 'edge[type = "org_link"]',
      style: { 'line-color': '#e65100', 'width': 2, 'opacity': ele => Math.max(0.1, 0.75 - ele.data('stale_rank') * 0.6) }
    },
    {
      selector: 'node.highlighted',
      style: { 'border-width': '3px', 'border-color': '#ffeb3b', 'z-index': 10 }
    },
    {
      selector: 'node.faded',
      style: { 'opacity': 0.15 }
    },
    {
      selector: 'edge.faded',
      style: { 'opacity': 0.05 }
    },
    {
      selector: '.hidden',
      style: { 'display': 'none' }
    },
  ];

  // ── init ──────────────────────────────────────────────────────────────────
  async function init() {
    const container = document.getElementById('kg-container');

    let graphData;
    try {
      const resp = await fetch('/graph.json');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      graphData = await resp.json();
    } catch (err) {
      container.innerHTML =
        '<p style="padding:1.5em;color:#e53935">Could not load graph.json: ' + err.message + '</p>';
      return;
    }

    const elements = [
      ...graphData.nodes.map(function(n) {
        var data = Object.assign({}, n);
        var s = (data.type === 'organisation' || data.type === 'project')
          ? staleness(data.activity_date) : 0;
        data.stale_factor = s;
        if (data.type === 'organisation') {
          var emoji = TYPE_EMOJI[data.org_type] || '';
          data.full_label  = emoji ? emoji + ' ' + data.label : data.label;
          data.short_label = emoji || '•';
          data.label       = data.short_label;
        }
        return { data: data };
      }),
      ...graphData.edges.map(function(e, i) {
        return { data: { id: 'e' + i, source: e.source, target: e.target, type: e.type || 'relates_to' } };
      }),
    ];

    // Sort orgs by activity rank. Initial zoom is always 1.0: most active org
    // reveals there, least active requires zoom 4.0.
    var orgEls = elements.filter(function(el) { return el.data.type === 'organisation'; });
    orgEls.sort(function(a, b) {
      var da = a.data.activity_date || '', db = b.data.activity_date || '';
      return da > db ? -1 : da < db ? 1 : 0;
    });
    orgEls.forEach(function(el, i) {
      var t = orgEls.length > 1 ? i / (orgEls.length - 1) : 0;
      el.data.reveal_zoom = 1.0 + t * 3.0;
      el.data.stale_rank  = t;
    });

    // Propagate stale_rank to edges: use the stalest endpoint.
    var nodeRank = {};
    elements.forEach(function(el) {
      if (el.data.stale_rank !== undefined) nodeRank[el.data.id] = el.data.stale_rank;
    });
    elements.forEach(function(el) {
      if (el.data.source !== undefined)
        el.data.stale_rank = Math.max(nodeRank[el.data.source] || 0, nodeRank[el.data.target] || 0);
    });

    var cy = cytoscape({
      container: container,
      elements:  elements,
      style:     STYLE,
      // Layout runs manually below so we can pre-position concept nodes first
      minZoom: 0.05,
      maxZoom: 10,
      wheelSensitivity: 0.3,
    });

    // ── positioning (no layout algorithm) ────────────────────────────────
    // 1. Concepts evenly spaced on a ring.
    var conceptNodes = cy.nodes('[type = "concept"]');
    var R = 500;
    conceptNodes.forEach(function(node, i) {
      var angle = (2 * Math.PI * i) / conceptNodes.length - Math.PI / 2;
      node.position({ x: R * Math.cos(angle), y: R * Math.sin(angle) });
    });

    // 2. Orgs/projects placed at the centroid of their connected concept
    //    positions, scaled 0.7× toward centre so they sit inside the ring.
    //    Golden-angle jitter by index spreads nodes that share a centroid.
    var GOLDEN = 2.39996; // ≈137.5°, avoids repeating radial lines
    cy.nodes('[type != "concept"]').forEach(function(node, i) {
      var linked = node.connectedEdges().connectedNodes('[type = "concept"]');
      var tx = 0, ty = 0;
      if (linked.length > 0) {
        linked.forEach(function(c) { tx += c.position('x'); ty += c.position('y'); });
        tx = (tx / linked.length) * 0.7;
        ty = (ty / linked.length) * 0.7;
      }
      var r = 30 + (i % 7) * 18;
      node.position({
        x: tx + r * Math.cos(i * GOLDEN),
        y: ty + r * Math.sin(i * GOLDEN),
      });
    });

    // 3. Apply active-only filter, then fit.
    cy.nodes().forEach(function(node) {
      var d = node.data();
      if (d.type !== 'concept' && d.status !== 'active') node.addClass('hidden');
    });
    cy.edges().forEach(function(edge) {
      if (cy.getElementById(edge.data('source')).hasClass('hidden') ||
          cy.getElementById(edge.data('target')).hasClass('hidden'))
        edge.addClass('hidden');
    });

    // Zoom-invariant font + progressive label reveal (each org has its own reveal_zoom)
    function updateZoom() {
      var z = cy.zoom();
      cy.nodes().forEach(function(node) {
        var d = node.data();
        node.style('font-size', ((d.type === 'project' ? 9 : 11) / z) + 'px');
        if (d.reveal_zoom !== undefined) {
          node.data('label', (node.hasClass('pinned') || z >= d.reveal_zoom) ? d.full_label : d.short_label);
        }
      });
    }

    cy.fit();
    updateZoom();
    cy.on('zoom', updateZoom);

    // Middle and right-click panning
    var _panning = false, _panAnchor = {x:0,y:0}, _panOrigin = {x:0,y:0};
    container.addEventListener('mousedown', function(e) {
      if (e.button === 1 || e.button === 2) {
        _panning = true;
        _panAnchor = { x: e.clientX, y: e.clientY };
        _panOrigin = { x: cy.pan().x, y: cy.pan().y };
        e.preventDefault();
      }
    });
    container.addEventListener('mousemove', function(e) {
      if (!_panning) return;
      cy.pan({ x: _panOrigin.x + e.clientX - _panAnchor.x, y: _panOrigin.y + e.clientY - _panAnchor.y });
    });
    ['mouseup', 'mouseleave'].forEach(function(ev) {
      container.addEventListener(ev, function(e) {
        if (ev === 'mouseleave' || e.button === 1 || e.button === 2) _panning = false;
      });
    });
    container.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    // ── info panel ────────────────────────────────────────────────────────
    var infoEl    = document.getElementById('kg-info');
    var infoBadge = document.getElementById('kg-info-badge');
    var infoTitle = document.getElementById('kg-info-title');
    var infoMeta  = document.getElementById('kg-info-meta');
    var infoLink  = document.getElementById('kg-info-link');

    function showInfo(d) {
      infoTitle.textContent = d.full_label || d.label;
      infoBadge.textContent = d.type + (d.status ? ' · ' + d.status : '');
      infoBadge.className   = 'kg-info__badge kg-info__badge--' + d.type;
      var meta = [];
      if (d.org_type) meta.push(d.org_type);
      if (d.activity_date) meta.push('Last active: ' + d.activity_date);
      infoMeta.textContent  = meta.join(' · ');
      infoLink.href         = d.url;
      infoEl.classList.remove('kg-info--hidden');
    }

    function hideInfo() {
      infoEl.classList.add('kg-info--hidden');
      cy.elements().removeClass('faded highlighted');
      cy.nodes().removeClass('pinned');
      updateZoom();
    }

    document.getElementById('kg-info-close').addEventListener('click', hideInfo);

    cy.on('tap', 'node', function(evt) {
      var node = evt.target;
      showInfo(node.data());
      cy.elements().addClass('faded').removeClass('highlighted');
      node.removeClass('faded').addClass('highlighted');
      var connectedEdges = node.connectedEdges().removeClass('faded');
      var neighbours = connectedEdges.connectedNodes().removeClass('faded');
      // Pin selected node + neighbours so they always show full label
      cy.nodes().removeClass('pinned');
      node.addClass('pinned');
      neighbours.addClass('pinned');
      updateZoom();
    });

    cy.on('tap', function(evt) {
      if (evt.target === cy) hideInfo();
    });

    cy.on('dblclick dbltap', 'node', function(evt) {
      var url = evt.target.data('url');
      if (url) window.location.href = url;
    });

    // ── filters ───────────────────────────────────────────────────────────
    function applyFilters() {
      var showConcepts = document.getElementById('kg-show-concepts').checked;
      var showOrgs     = document.getElementById('kg-show-orgs').checked;
      var showProjects = document.getElementById('kg-show-projects').checked;
      var activeOnly   = document.getElementById('kg-active-only').checked;

      cy.nodes().forEach(function(node) {
        var d = node.data();
        var hide =
          (d.type === 'concept'      && !showConcepts) ||
          (d.type === 'organisation' && !showOrgs)     ||
          (d.type === 'project'      && !showProjects) ||
          (activeOnly && d.type !== 'concept' && d.status !== 'active');
        node.toggleClass('hidden', hide);
      });

      cy.edges().forEach(function(edge) {
        edge.toggleClass('hidden',
          cy.getElementById(edge.data('source')).hasClass('hidden') ||
          cy.getElementById(edge.data('target')).hasClass('hidden'));
      });
    }

    ['kg-show-concepts', 'kg-show-orgs', 'kg-show-projects', 'kg-active-only']
      .forEach(function(id) {
        document.getElementById(id).addEventListener('change', applyFilters);
      });

    // ── search ────────────────────────────────────────────────────────────
    document.getElementById('kg-search').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      cy.elements().removeClass('faded highlighted');
      if (q) {
        cy.elements().addClass('faded');
        cy.nodes().filter(function(n) {
          return n.data('label').toLowerCase().indexOf(q) !== -1;
        }).removeClass('faded').addClass('highlighted')
          .connectedEdges().removeClass('faded');
      }
    });

    // ── fit / reset ───────────────────────────────────────────────────────
    document.getElementById('kg-fit').addEventListener('click', function() { cy.fit(); });

    document.getElementById('kg-reset').addEventListener('click', function() {
      document.getElementById('kg-show-concepts').checked = true;
      document.getElementById('kg-show-orgs').checked     = true;
      document.getElementById('kg-show-projects').checked = true;
      document.getElementById('kg-active-only').checked   = true;
      document.getElementById('kg-search').value          = '';
      cy.elements().removeClass('faded highlighted hidden');
      applyFilters();
      cy.fit();
      hideInfo();
    });

    // ── fullscreen ────────────────────────────────────────────────────────
    document.getElementById('kg-fullscreen').addEventListener('click', function() {
      var el = document.getElementById('kg-container');
      if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      }
    });

    document.addEventListener('fullscreenchange', function() {
      document.getElementById('kg-fullscreen').textContent =
        document.fullscreenElement ? '✕ Exit fullscreen' : '⛶ Fullscreen';
      cy.fit();
    });
  }

  init();
})();
</script>
{% endblock %}
